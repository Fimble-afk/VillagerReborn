    displayName="Villager Reborn"
    description='''
Villager Reborn brings your Minecraft villages to life!

Features:
- Rich villager dialogue based on profession, time of day, and your reputation
- Quest system: deliver items, gather resources, or slay monsters
- Village Reputation System with 5 ranks: Stranger, Acquaintance, Friend, Ally, Champion
- Daily emerald income based on your rank
- Personal Guardian Golem for Champions
- Villager AI expansion: farmers tend crops, masons lay paths, new buildings appear
- Quest Journal item to track all progress

Talk to villagers by right-clicking them!
'''
